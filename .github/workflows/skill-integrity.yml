name: Skill Integrity

on:
  pull_request:
    branches: [master, main]

jobs:
  validate:
    name: Validate engineering assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run skill integrity check
        run: bash scripts/ci/validate-skill.sh
